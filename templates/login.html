<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Barangay Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .card-header {
            background: #212529;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border: none;
        }
        .brand-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #212529;
            background-color: #fff;
        }
        .btn-login {
            background: #212529;
            color: white;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #343a40;
            color: white;
            transform: translateY(-2px);
        }
        .footer-text {
            font-size: 0.8rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="login-card card">
    <div class="card-header">
        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h3 class="fw-bold">Brgy System</h3>
        <p class="small text-secondary mb-0">Management Information System</p>
    </div>
    
    <div class="card-body p-4">
        <div class="alert alert-info py-2 small border-0">
            <i class="bi bi-info-circle me-1"></i> Admin Portal Access
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" placeholder="Enter your username">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" id="passwordInput" placeholder="••••••••">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <a href="/dashboard" class="btn btn-login w-100 mb-3 text-decoration-none d-block text-center">
                SIGN IN
            </a>
            
            <div class="text-center">
                <a href="#" class="text-decoration-none small text-muted">Forgot password?</a>
            </div>
        </form>
    </div>
    
    <div class="card-footer bg-white border-0 text-center pb-4">
        <p class="footer-text mb-0">Developed for Barangay Documentation Project v1.0</p>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('passwordInput');
        const toggleIcon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>

</body>
</html>
