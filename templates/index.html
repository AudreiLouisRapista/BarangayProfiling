<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Profile System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">🏠 Barangay System</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="#">Dashboard</a>
                <a class="nav-link" href="#">Residents</a>
                <a class="nav-link" href="#">Reports</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h2>Welcome, Administrator</h2>
                <p class="text-muted">Manage your barangay records efficiently.</p>
            </div>
        </div>

        <div class="row text-center mb-5">
            <div class="col-md-4">
                <div class="card p-4 bg-white">
                    <h5 class="text-primary">Total Residents</h5>
                    <h2 class="fw-bold">1,240</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 bg-white">
                    <h5 class="text-success">Verified Households</h5>
                    <h2 class="fw-bold">312</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 bg-white">
                    <h5 class="text-warning">Pending Requests</h5>
                    <h2 class="fw-bold">14</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card p-4">
                    <h5 class="mb-3">Quick Search</h5>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Search resident by name or ID...">
                        <button class="btn btn-primary" type="button">Search</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 bg-primary text-white">
                    <h5>Quick Tools</h5>
                    <button class="btn btn-light w-100 mb-2">+ Add New Resident</button>
                    <button class="btn btn-outline-light w-100">Generate Brgy Clearance</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
