<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brgy System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Your Sidebar CSS remains here as the global layout */
        .sidebar { 
            height: 100vh; 
            width: 250px; 
            position: fixed; 
            background: #212529; 
            color: white; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        .main-content { margin-left: 250px; padding: 20px; width: calc(100% - 250px); }
        .nav-link { color: #adb5bd; padding: 10px 15px; border-radius: 8px; transition: all 0.3s; display: block; text-decoration: none; }
        .nav-link:hover { background: #343a40; color: white; padding-left: 20px; }
        .nav-link i { margin-right: 10px; }
        .admin-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; margin-top: 15px; margin-bottom: 5px; font-weight: bold; }
        .active-link { background: #0d6efd !important; color: white !important; font-weight: bold; padding-left: 20px; }
    </style>
    <script
    src="https://www.tuqlas.com/chatbot.js"
    data-key="tq_live_2deb0b7ed903ce29e6ed3dc52462155e5213d9f6"
    data-api="https://www.tuqlas.com"
    defer
    ></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <h3 class="mb-0">
             <a href="/dashboard" class="text-white text-decoration-none">
                <i class="bi bi-house-door-fill me-2"></i>Brgy System
             </a>
        </h3>
        
        <hr class="text-secondary">
        <div class="px-3 small text-white-50">
            <i class="bi bi-person-circle me-2"></i>ADMINISTRATOR
        </div>
        <hr class="text-secondary">

        <p class="admin-label">Main Navigation</p>
        
        <nav class="nav flex-column">
            <a href="/dashboard" class="nav-link {% if segment == 'dashboard' %}active-link{% endif %}">
                <i class="bi bi-border-all"></i> Dashboard
            </a>

            <a href="/employees" class="nav-link {% if segment == 'employees' %}active-link{% endif %}">
                <i class="bi bi-people"></i> Employees
            </a>

               <a href="/residence" class="nav-link {% if segment == 'residence' %}active-link{% endif %}">
                <i class="bi bi-person-plus-fill"></i> Residence
            </a>

            <a href="/certificates" class="nav-link {% if segment == 'certificates' %}active-link{% endif %}">
                <i class="bi bi-file-earmark-text"></i> Certificates
            </a>

            <a href="/finances" class="nav-link {% if segment == 'finances' %}active-link{% endif %}">
                <i class="bi bi-bank"></i> Finances
            </a>

           
        </nav>

        <div class="mt-auto">
            <hr class="text-secondary">
            <a href="/logout" class="nav-link text-danger">
                <i class="bi bi-box-arrow-in-left"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
